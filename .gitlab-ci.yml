variables:
  GIT_DEPTH: 1
  PLATFORMIO_CACHE_DIR:
    "$CI_PROJECT_DIR/.cache/pio"
  PLATFORMIO_DISABLE_PROGRESSBAR:
    "true"

stages:
 - build
 - deploy

build-app:
  stage: build
  needs: []
  tags:
   - docker
  image: 
    name: esphome/esphome:2026.3.1
    entrypoint: [""]
  cache:
    key: ${CI_JOB_NAME}
    paths:
      - .cache/pio
  script:
    - rm -rf .esphome/build/*   # clean pio build directory
    - esphome config custom.yaml
    - esphome compile custom.yaml
  artifacts:
    name: "$CI_JOB_STARTED_AT"
    paths:
      - .esphome/build/mhi-ac-control/.pioenvs/mhi-ac-control/*.bin

